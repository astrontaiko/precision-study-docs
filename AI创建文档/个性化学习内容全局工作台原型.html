<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个性化学习内容全局工作台原型</title>
  <style>
    :root {
      --bg: #eef7fb;
      --panel: rgba(255, 255, 255, 0.94);
      --line: #d8e8f5;
      --soft: #eef5ff;
      --blue: #315df5;
      --blue-deep: #203a63;
      --teal: #12b9c8;
      --green: #1ab56e;
      --orange: #f0a128;
      --violet: #7b57ff;
      --text: #21314f;
      --muted: #7082a0;
      --shadow: 0 22px 48px rgba(69, 103, 157, 0.12);
      --radius: 24px;
      --font: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(49, 93, 245, 0.1), transparent 25%),
        radial-gradient(circle at top right, rgba(18, 185, 200, 0.1), transparent 20%),
        linear-gradient(180deg, #edf8fb 0%, #f9fcff 100%);
    }
    button { font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 236px 1fr;
    }
    .sidebar {
      padding: 18px;
      border-right: 1px solid rgba(216, 232, 245, 0.9);
      background: rgba(255,255,255,0.52);
      backdrop-filter: blur(12px);
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #476188;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .student-card {
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .student-main {
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, #dbe9ff, #edf4ff);
      color: var(--blue);
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
    }
    .student-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .student-item {
      height: 50px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      padding: 0 14px;
      color: #4d6288;
      cursor: pointer;
    }
    .student-item.active {
      background: #edf4ff;
      border-color: #d6e4fb;
      color: var(--blue);
      font-weight: 700;
    }

    .main {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 8px 0;
    }
    .userbox {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #fff4d6, #ffe5b5);
      font-size: 28px;
    }
    .userbox h1 {
      margin: 0;
      font-size: 22px;
    }
    .userbox p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .global-nav {
      display: flex;
      gap: 22px;
      align-items: center;
      color: #506482;
      font-weight: 600;
    }
    .global-nav .active {
      color: var(--blue);
      position: relative;
    }
    .global-nav .active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -10px;
      height: 3px;
      border-radius: 999px;
      background: var(--blue);
    }
    .toolbar {
      display: flex;
      gap: 16px;
      align-items: center;
      color: #506482;
    }

    .subject-strip {
      display: flex;
      gap: 10px;
      overflow: auto;
      padding: 4px 0 2px;
    }
    .subject-chip {
      min-width: 220px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.88);
      padding: 14px 16px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(66, 95, 154, 0.08);
    }
    .subject-chip.active {
      border-color: #9ab7ff;
      background: linear-gradient(180deg, #edf4ff, #ffffff);
      box-shadow: 0 12px 28px rgba(49, 93, 245, 0.14);
    }
    .subject-chip strong {
      display: block;
      font-size: 16px;
      margin-bottom: 8px;
    }
    .subject-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
    }
    .subject-badge {
      padding: 3px 8px;
      border-radius: 999px;
      background: #eff5ff;
      color: var(--blue);
      font-weight: 700;
    }

    .workspace {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: calc(100vh - 170px);
      display: flex;
      flex-direction: column;
    }
    .workspace-head {
      padding: 18px 22px 14px;
      border-bottom: 1px solid #e7eefc;
      background: linear-gradient(180deg, #f6faff, #edf4ff);
    }
    .workspace-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .workspace-head h2 {
      margin: 0;
      font-size: 24px;
    }
    .workspace-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .metrics {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .metric {
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: #4f6386;
      font-size: 12px;
    }
    .mode-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .mode-tab {
      padding: 10px 16px;
      border-radius: 14px;
      border: 1px solid #d7e4fb;
      background: #fff;
      color: #4d6288;
      cursor: pointer;
      font-weight: 700;
    }
    .mode-tab.active {
      background: linear-gradient(135deg, var(--blue), #5f84ff);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(49, 93, 245, 0.24);
    }

    .workspace-body {
      padding: 18px;
      flex: 1;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr) 320px;
      gap: 16px;
      min-height: 0;
    }
    .panel {
      border: 1px solid #dfe9f8;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
      border-radius: 24px;
      overflow: hidden;
      min-height: 0;
    }
    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid #edf2fc;
      background: #f8fbff;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .panel-body {
      padding: 14px;
    }
    .phase-nav, .lesson-nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .phase-btn, .lesson-btn {
      width: 100%;
      text-align: left;
      border-radius: 16px;
      border: 1px solid #dce7fb;
      background: #fff;
      padding: 14px;
      cursor: pointer;
      color: #41577e;
    }
    .phase-btn.active, .lesson-btn.active {
      border-color: #91b1ff;
      background: #edf4ff;
      color: var(--blue);
      box-shadow: 0 10px 20px rgba(49, 93, 245, 0.12);
    }
    .phase-btn strong, .lesson-btn strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .canvas-shell {
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 100%;
    }
    .banner {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .banner-card {
      border-radius: 18px;
      padding: 16px;
      border: 1px solid #dce8fb;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }
    .banner-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }
    .canvas {
      flex: 1;
      border: 1px solid #dfe9f8;
      border-radius: 24px;
      background: linear-gradient(180deg, #fafdff, #eef6ff);
      padding: 16px;
      overflow: auto;
    }
    .chapter-card {
      border-radius: 20px;
      border: 1px solid #dbe8fb;
      background: rgba(255,255,255,0.92);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .chapter-head {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: #edf4ff;
      cursor: pointer;
    }
    .chapter-head strong {
      font-size: 16px;
    }
    .chapter-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .unit-row {
      border-radius: 16px;
      padding: 14px;
      background: #f7fbff;
      border: 1px solid #e1ebfb;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr) 100px;
      gap: 12px;
      align-items: start;
    }
    .unit-row strong {
      display: block;
      margin-bottom: 6px;
    }
    .module-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .module-pill {
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid #dbe7fb;
      background: #fff;
      font-size: 12px;
    }
    .module-pill.new { background: #f2fff8; border-color: #bfe9d0; color: #0e8d53; }
    .module-pill.link { background: #fffaf0; border-color: #ffd99b; color: #b67808; }
    .progress-tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef3ff;
      color: var(--blue);
      font-size: 12px;
      text-align: center;
      font-weight: 700;
    }

    .task-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .task-tab {
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid #dbe7fb;
      background: #fff;
      color: #4f6386;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .task-tab.active {
      background: #edf4ff;
      color: var(--blue);
      border-color: #9db8ff;
    }
    .task-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .task-card {
      border-radius: 18px;
      border: 1px solid #dce8fb;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      padding: 14px;
    }
    .task-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .mini-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #d7e4fb;
      background: #fff;
      color: #4b6287;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }
    .mini-btn.primary {
      background: linear-gradient(135deg, var(--blue), #5f84ff);
      color: #fff;
      border-color: transparent;
    }
    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    .queue-item {
      border-radius: 14px;
      border: 1px solid #dfe9fb;
      background: #fff;
      padding: 12px;
    }
    .queue-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef3ff;
      color: #5070a6;
      font-size: 11px;
    }
    .hidden { display: none !important; }

    @media (max-width: 1280px) {
      .workspace-body { grid-template-columns: 220px minmax(0, 1fr); }
      .right-pane { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="back">← 寒假二期课程</div>
      <div class="student-card">
        <div class="student-main" id="mainStudentName">李梓萌</div>
        <div class="student-list">
          <button class="student-item active">李梓萌</button>
          <button class="student-item">乐乐</button>
          <button class="student-item">子渔</button>
          <button class="student-item">张心昕</button>
          <button class="student-item">小九</button>
          <button class="student-item">杨卓桐十二</button>
          <button class="student-item">刘子瑜</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="userbox">
          <div class="avatar">🦊</div>
          <div>
            <h1>李梓萌</h1>
            <p>个性化学习工作台 · 课上地图、课后练习、试卷测评统一管理</p>
          </div>
        </div>
        <div class="global-nav">
          <span class="active">学习工作台</span>
          <span>反馈</span>
          <span>专注度</span>
          <span>档案</span>
          <span>AI百宝箱</span>
        </div>
        <div class="toolbar">
          <span>识图搜题</span>
          <span>学习权限</span>
          <span>5100</span>
        </div>
      </div>

      <div class="subject-strip" id="subjectStrip"></div>

      <section class="workspace">
        <div class="workspace-head">
          <div class="workspace-head-top">
            <div>
              <h2 id="workspaceTitle">数学 · 人教版七下 · 学习工作台</h2>
              <p id="workspaceHint">地图是每天课上的学习主线；练习、试卷和测评放入同一学科工作台中，避免老师在多个页面之间来回切换。</p>
            </div>
            <div class="metrics" id="workspaceMetrics"></div>
          </div>
          <div class="mode-tabs" id="modeTabs"></div>
        </div>

        <div class="workspace-body">
          <section class="panel">
            <div class="panel-head">学习阶段与课次 <span class="hint">同一学科下切换阶段和当天课次</span></div>
            <div class="panel-body">
              <div class="phase-nav" id="phaseNav"></div>
              <div style="height:12px;"></div>
              <div class="lesson-nav" id="lessonNav"></div>
            </div>
          </section>

          <section class="canvas-shell">
            <div class="banner" id="summaryBanner"></div>
            <div class="canvas" id="mainCanvas"></div>
          </section>

            <section class="panel right-pane">
              <div class="panel-head">学习任务台 <span class="hint">不再孤立放在训练场，直接跟随当前学科与阶段联动</span></div>
              <div class="panel-body">
                <div class="task-tabs" id="taskTabs"></div>
                <div id="taskContent"></div>
              </div>
            </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    var state = {
      subjectId: "math",
      mode: "map",
      taskTab: "classroom",
      currentPhase: "phase1",
      currentLesson: "lesson1",

    };

    var subjects = [

        ],
        banners: [

              { title: "专项练习", hint: "按章节、知识元、错题类型生成专项练习，适合课后补薄弱点。", actions: ["按章节生成", "按错题生成"] },

            ],
            queue: [
              { title: "待学 · 带电体的性质-补充学", meta: ["1题模", "待学习", "3月25日"] },

          },
          exam: {

              { title: "章节卷", hint: "每个章节学完后直接生成章节试卷，跟地图主线天然衔接。", actions: ["生成章节卷"] },

            ],

      {
        id: "english",

        name: "英语",

        status: "同步推进",
        summary: "地图主线 10 次课 / 训练任务 6 个",
        phases: [
          {

            lessons: [
              { id: "lesson1", title: "第1次课", summary: "待学 4 个知识点" },
              { id: "lesson2", title: "第2次课", summary: "待学 5 个知识点" }
            ],
            chapters: [
              {
                id: "chapter-1",
                title: "Unit 1 My Day",

                units: [
                  { name: "核心词汇", desc: "单词输入与跟读", progress: "完成 60%", modules: [

                  ]},
                  { name: "句型输出", desc: "口语问答", progress: "完成 35%", modules: [

        ],
        banners: [

          ["阶段动作", "本周末生成单元口语小测。"]
        ],
        tasks: {

        phases: [
          {
            id: "phase1",
            title: "单元预热",
            summary: "阅读主线 + 表达积累",
            lessons: [
              { id: "lesson1", title: "第1次课", summary: "待学 3 个知识点" }
            ],
            chapters: [
              {
                id: "chapter-1",
                title: "第一单元 叙事阅读",
                focus: "待启动",
                units: [
                  { name: "抓关键词", desc: "阅读主线", progress: "完成 0%", modules: [
                    { name: "概括主要内容", kind: "new" },
                    { name: "抓关键词句", kind: "link" }
                  ]}
                ]
              }
            ]
          }
        ],
        banners: [
          ["今日课上目标", "尚未开始，建议先完成规划。"],
          ["课后承接重点", "本学科暂无作业任务。"],
          ["阶段动作", "完成规划后自动生成阅读与练笔任务。"]
        ],
        tasks: {
          classroom: {
            title: "课堂配套动作",
            cards: [{ title: "待规划", hint: "语文学科尚未创建完整学习规划。", actions: ["去创建规划"] }],
            queue: []
          },
          practice: {
            title: "课后练习与作业",
            cards: [{ title: "待规划", hint: "生成规划后可自动承接练习与阅读任务。", actions: ["去创建规划"] }],
            queue: []
          },
          exam: {
            title: "试卷与测评",
            cards: [{ title: "待规划", hint: "先建立章节主线，再生成试卷更合理。", actions: ["去创建规划"] }],
            queue: []
          }

    ];

    var modeDefs = [
      { id: "map", label: "课上地图" },
      { id: "practice", label: "练习作业" },
      { id: "exam", label: "试卷测评" }
    ];

    var taskTabs = [
      { id: "classroom", label: "课上即时动作" },
      { id: "practice", label: "课后练习" },
      { id: "exam", label: "试卷测评" }
    ];

    function currentSubject() {
      return subjects.find(function (item) { return item.id === state.subjectId; }) || subjects[0];
    }

    function currentPhase() {
      var list = currentSubject().phases;
      return list.find(function (item) { return item.id === state.currentPhase; }) || list[0];
    }

    function currentLesson() {
      var list = currentPhase().lessons;
      return list.find(function (item) { return item.id === state.currentLesson; }) || list[0];
    }

    function ensureState() {
      var subject = currentSubject();
      if (!subject.phases.find(function (item) { return item.id === state.currentPhase; })) {
        state.currentPhase = subject.phases[0].id;
      }
      if (!currentPhase().lessons.find(function (item) { return item.id === state.currentLesson; })) {
        state.currentLesson = currentPhase().lessons[0].id;
      }
      if (state.mode === "map") state.taskTab = "classroom";
      if (state.mode === "practice") state.taskTab = "practice";
      if (state.mode === "exam") state.taskTab = "exam";
    }

    function renderSubjectStrip() {
      document.getElementById("subjectStrip").innerHTML = subjects.map(function (item) {
        return '<button class="subject-chip' + (item.id === state.subjectId ? ' active' : '') + '" data-subject="' + item.id + '">' +
          '<strong>' + item.label + ' ' + item.name + ' / ' + item.edition + '</strong>' +
          '<div class="subject-meta"><span>' + item.summary + '</span><span class="subject-badge">' + item.status + '</span></div>' +
        '</button>';
      }).join("");
      document.querySelectorAll("[data-subject]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.subjectId = btn.getAttribute("data-subject");
          state.currentPhase = currentSubject().phases[0].id;
          state.currentLesson = currentPhase().lessons[0].id;
          state.mode = "map";
          ensureState();
          render();
        });
      });
    }

    function renderHeader() {
      var subject = currentSubject();
      document.getElementById("workspaceTitle").textContent = subject.name + " · " + subject.edition + " · 学习工作台";
      document.getElementById("workspaceHint").textContent =
        subject.name === "数学"
          ? "地图承接每天课上的学习主线；练习、试卷和测评与当前学科、当前阶段联动，老师不需要再跳去单独的训练场。"
          : "当前学科的课上主线、课后练习和试卷测评统一放在一个工作台内，方便老师连续决策。";
      document.getElementById("workspaceMetrics").innerHTML = [
        "当前阶段：" + currentPhase().title,
        "当前课次：" + currentLesson().title,
        "今日动作：" + (state.mode === "map" ? "课上推进" : state.mode === "practice" ? "练习承接" : "试卷生成"),
        "学科状态：" + subject.status
      ].map(function (item) {
        return '<span class="metric">' + item + '</span>';
      }).join("");
      document.getElementById("modeTabs").innerHTML = modeDefs.map(function (item) {
        return '<button class="mode-tab' + (item.id === state.mode ? ' active' : '') + '" data-mode="' + item.id + '">' + item.label + '</button>';
      }).join("");
      document.querySelectorAll("[data-mode]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.mode = btn.getAttribute("data-mode");
          ensureState();
          render();
        });
      });
    }

    function renderLeftNav() {
      var subject = currentSubject();
      document.getElementById("phaseNav").innerHTML = subject.phases.map(function (item) {
        return '<button class="phase-btn' + (item.id === state.currentPhase ? ' active' : '') + '" data-phase="' + item.id + '">' +
          '<strong>' + item.title + '</strong><div class="hint">' + item.summary + '</div></button>';
      }).join("");
      document.querySelectorAll("[data-phase]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.currentPhase = btn.getAttribute("data-phase");
          state.currentLesson = currentPhase().lessons[0].id;
          render();
        });
      });
      document.getElementById("lessonNav").innerHTML = currentPhase().lessons.map(function (item) {
        return '<button class="lesson-btn' + (item.id === state.currentLesson ? ' active' : '') + '" data-lesson="' + item.id + '">' +
          '<strong>' + item.title + '</strong><div class="hint">' + item.summary + '</div></button>';
      }).join("");
      document.querySelectorAll("[data-lesson]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.currentLesson = btn.getAttribute("data-lesson");
          render();
        });
      });
    }

    function renderBanner() {
      document.getElementById("summaryBanner").innerHTML = currentSubject().banners.map(function (item) {
        return '<div class="banner-card"><strong>' + item[0] + '</strong><div class="hint">' + item[1] + '</div></div>';
      }).join("");
    }

    function renderMapCanvas() {
      var phase = currentPhase();
      document.getElementById("mainCanvas").innerHTML = phase.chapters.map(function (chapter) {
        var open = !!state.expandedChapterIds[chapter.id];
        return '<section class="chapter-card">' +
          '<div class="chapter-head" data-chapter="' + chapter.id + '">' +
            '<div><strong>' + chapter.title + '</strong><div class="hint">' + chapter.focus + ' · ' + phase.title + '</div></div>' +
            '<span class="progress-tag">' + (open ? '收起' : '展开') + '</span>' +
          '</div>' +
          '<div class="chapter-body' + (open ? '' : ' hidden') + '">' +
            chapter.units.map(function (unit) {
              return '<div class="unit-row">' +
                '<div><strong>' + unit.name + '</strong><div class="hint">' + unit.desc + '</div></div>' +
                '<div class="module-stack">' + unit.modules.map(function (module) {
                  return '<span class="module-pill ' + module.kind + '">' + module.name + '</span>';
                }).join("") + '</div>' +
                '<div class="progress-tag">' + unit.progress + '</div>' +
              '</div>';
            }).join("") +
          '</div>' +
        '</section>';
      }).join("");
      document.querySelectorAll("[data-chapter]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var id = btn.getAttribute("data-chapter");
          state.expandedChapterIds[id] = !state.expandedChapterIds[id];
          renderMapCanvas();
        });
      });
    }

    function renderTaskPane() {
      var subject = currentSubject();
      document.getElementById("taskTabs").innerHTML = taskTabs.map(function (item) {
        return '<button class="task-tab' + (item.id === state.taskTab ? ' active' : '') + '" data-task-tab="' + item.id + '">' + item.label + '</button>';
      }).join("");
      document.querySelectorAll("[data-task-tab]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.taskTab = btn.getAttribute("data-task-tab");
          renderTaskPane();
        });
      });
      var block = subject.tasks[state.taskTab];
      document.getElementById("taskContent").innerHTML =
        '<div class="task-section">' +
          block.cards.map(function (card) {
            return '<div class="task-card"><strong>' + card.title + '</strong><div class="hint">' + card.hint + '</div><div class="action-row">' +
              card.actions.map(function (action, index) {
                return '<button class="mini-btn' + (index === 0 ? ' primary' : '') + '">' + action + '</button>';
              }).join("") +
            '</div></div>';
          }).join("") +
          '<div class="task-card"><strong>' + block.title + ' · 待处理队列</strong><div class="queue-list">' +
            (block.queue.length ? block.queue.map(function (item) {
              return '<div class="queue-item"><strong>' + item.title + '</strong><div class="hint">' + item.meta.join(" · ") + '</div><div class="badge-row">' +
                item.meta.map(function (meta) { return '<span class="badge">' + meta + '</span>'; }).join("") +
              '</div></div>';
            }).join("") : '<div class="hint">当前没有待处理任务。</div>') +
          '</div></div>' +
        '</div>';
    }

    function renderPracticeCanvas() {
      document.getElementById("mainCanvas").innerHTML =
        '<section class="chapter-card"><div class="chapter-head"><div><strong>练习承接设计</strong><div class="hint">这里不再只是“训练场”，而是当前学科的课后任务中心。</div></div><span class="progress-tag">课后</span></div>' +
          '<div class="chapter-body">' +
            '<div class="unit-row"><div><strong>与地图联动</strong><div class="hint">默认继承当前学科、当前阶段、当前课次。</div></div><div class="module-stack"><span class="module-pill new">自动带入本课知识元</span><span class="module-pill link">自动优先错题</span><span class="module-pill link">可补专项练习</span></div><div class="progress-tag">已联动</div></div>' +
            '<div class="unit-row"><div><strong>练习分类</strong><div class="hint">课后作业、专项练习、错题重练在同一层级展示。</div></div><div class="module-stack"><span class="module-pill new">每日作业</span><span class="module-pill link">专项练习</span><span class="module-pill link">错题回流</span></div><div class="progress-tag">3类</div></div>' +
            '<div class="unit-row"><div><strong>老师决策点</strong><div class="hint">老师只需要决定“补不补”“题量多少”“是否直接推送”。</div></div><div class="module-stack"><span class="module-pill new">调题量</span><span class="module-pill link">选题型</span><span class="module-pill link">立即推送</span></div><div class="progress-tag">轻量操作</div></div>' +
          '</div></section>';
    }

    function renderExamCanvas() {
      document.getElementById("mainCanvas").innerHTML =
        '<section class="chapter-card"><div class="chapter-head"><div><strong>试卷与测评中心</strong><div class="hint">试卷生成不再放在独立训练场入口，而是作为学科工作台下的一个核心模式。</div></div><span class="progress-tag">测评</span></div>' +
          '<div class="chapter-body">' +
            '<div class="unit-row"><div><strong>试卷类型</strong><div class="hint">按使用场景组织，而不是按工具组织。</div></div><div class="module-stack"><span class="module-pill new">先测后学</span><span class="module-pill link">章节卷</span><span class="module-pill link">期中期末卷</span><span class="module-pill link">真题模拟</span></div><div class="progress-tag">4类</div></div>' +
            '<div class="unit-row"><div><strong>与地图联动</strong><div class="hint">系统自动识别当前学到哪一章、哪些节点已学、哪些错题高频。</div></div><div class="module-stack"><span class="module-pill new">已学节点自动入卷</span><span class="module-pill link">薄弱模加权</span></div><div class="progress-tag">自动推荐</div></div>' +
            '<div class="unit-row"><div><strong>老师操作</strong><div class="hint">老师可以直接在当前学科页面生成测学卷、章节卷或考前卷，不需要切换心智模型。</div></div><div class="module-stack"><span class="module-pill new">一键生成</span><span class="module-pill link">自定义范围</span><span class="module-pill link">查看历史卷</span></div><div class="progress-tag">高频入口</div></div>' +
          '</div></section>';
    }

    function renderCanvas() {
      if (state.mode === "map") renderMapCanvas();
      else if (state.mode === "practice") renderPracticeCanvas();
      else renderExamCanvas();
    }

    function render() {
      ensureState();
      renderSubjectStrip();
      renderHeader();
      renderLeftNav();
      renderBanner();
      renderCanvas();
      renderTaskPane();
    }

    render();
  </script>
</body>
</html>
